<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="リマインダー">
<title>リマインダー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: #F2F2F7;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

#header {
  background: rgba(242,242,247,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 10;
  padding: 16px 20px 0;
  border-bottom: 0.5px solid rgba(0,0,0,0.1);
}

#header-inner { max-width: 480px; margin: 0 auto; }

#header-top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 12px;
}

#count-label { font-size: 13px; color: #8E8E93; font-weight: 500; margin-bottom: 2px; }
h1 { font-size: 32px; font-weight: 700; color: #1C1C1E; line-height: 1.1; }

#header-buttons { display: flex; gap: 8px; align-items: center; }

.header-btn {
  background: white;
  border: 1.5px solid #E5E5EA;
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  color: #3A3A3C;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.2s;
  font-family: inherit;
  white-space: nowrap;
}

#claude-btn.active { background: #FFF3E0; border-color: #FF9500; color: #FF9500; }
#copy-btn { border-color: #34C759; color: #34C759; }
#copy-btn.copied { background: #F0FFF4; }

#filters { display: flex; gap: 4px; padding-bottom: 12px; }

.filter-btn {
  padding: 6px 14px;
  border-radius: 16px;
  border: none;
  font-size: 13px;
  font-weight: 400;
  background: transparent;
  color: #8E8E93;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.filter-btn.active { font-weight: 600; background: #007AFF; color: white; }

#main { max-width: 480px; margin: 0 auto; padding: 16px 16px 140px; }

/* Claude panel */
#claude-panel {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid #FFE0B2;
  box-shadow: 0 2px 12px rgba(255,149,0,0.08);
  display: none;
}
#claude-panel.open { display: block; }

#claude-panel-title {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  font-size: 14px;
  font-weight: 600;
  color: #1C1C1E;
}

#claude-response {
  background: #FFF8F0;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
  font-size: 14px;
  color: #3A3A3C;
  line-height: 1.7;
  white-space: pre-wrap;
  border-left: 3px solid #FF9500;
  display: none;
}

#claude-input-row { display: flex; gap: 8px; }

#claude-input {
  flex: 1;
  border: 1px solid #E5E5EA;
  border-radius: 10px;
  padding: 9px 12px;
  font-size: 14px;
  outline: none;
  color: #1C1C1E;
  background: #F9F9F9;
  font-family: inherit;
}

#claude-ask-btn {
  background: #FF9500;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 9px 16px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.2s;
}
#claude-ask-btn:disabled { opacity: 0.5; cursor: default; }

/* Task list */
#task-list {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.task-item {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 0.5px solid #F2F2F7;
  gap: 12px;
}
.task-item:last-child { border-bottom: none; }

.check-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  flex-shrink: 0;
  line-height: 0;
  width: 22px;
  height: 22px;
}

.task-text {
  flex: 1;
  font-size: 16px;
  color: #1C1C1E;
  line-height: 1.4;
  word-break: break-all;
}
.task-text.done { color: #C7C7CC; text-decoration: line-through; }

.delete-btn {
  background: none;
  border: none;
  padding: 4px;
  cursor: pointer;
  opacity: 0.35;
  line-height: 0;
  flex-shrink: 0;
}
.delete-btn:active { opacity: 0.9; }

#empty-msg {
  padding: 40px 20px;
  text-align: center;
  color: #C7C7CC;
  font-size: 15px;
}

#clear-done-btn {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  background: white;
  border: none;
  border-radius: 12px;
  color: #FF3B30;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  font-family: inherit;
  display: none;
}

/* Toast */
#toast {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(40,40,40,0.92);
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 100;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Bottom input */
#bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(242,242,247,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid rgba(0,0,0,0.1);
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}

#bottom-bar-inner { max-width: 480px; margin: 0 auto; display: flex; gap: 10px; }

#task-input {
  flex: 1;
  border: 1px solid #E5E5EA;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 16px;
  outline: none;
  color: #1C1C1E;
  background: white;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  font-family: inherit;
}

#add-btn {
  background: #E5E5EA;
  color: white;
  border: none;
  border-radius: 12px;
  width: 48px;
  font-size: 26px;
  cursor: default;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding-bottom: 2px;
  font-family: inherit;
}
#add-btn.active { background: #007AFF; cursor: pointer; }
</style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div id="header-top">
      <div>
        <div id="count-label"></div>
        <h1>リマインダー</h1>
      </div>
      <div id="header-buttons">
        <button class="header-btn" id="copy-btn" onclick="copyTasks()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          コピー
        </button>
        <button class="header-btn" id="claude-btn" onclick="toggleClaude()">
          <svg width="13" height="13" viewBox="0 0 24 24"><path d="M12 2L13.5 9L20 10.5L13.5 12L12 19L10.5 12L4 10.5L10.5 9Z" fill="currentColor"/></svg>
          Claude
        </button>
      </div>
    </div>
    <div id="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('active',this)">未完了</button>
      <button class="filter-btn" onclick="setFilter('done',this)">完了</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="claude-panel">
    <div id="claude-panel-title">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 2L13.5 9L20 10.5L13.5 12L12 19L10.5 12L4 10.5L10.5 9Z" fill="#FF9500"/></svg>
      Claudeに相談
    </div>
    <div id="claude-response"></div>
    <div id="claude-input-row">
      <input id="claude-input" type="text" placeholder="質問を入力（空白で整理してもらう）" onkeydown="if(event.key==='Enter')askClaude()">
      <button id="claude-ask-btn" onclick="askClaude()">聞く</button>
    </div>
  </div>

  <div id="task-list">
    <div id="empty-msg">タスクを追加してみましょう</div>
  </div>

  <button id="clear-done-btn" onclick="clearDone()">完了済みを削除</button>
</div>

<div id="toast"></div>

<div id="bottom-bar">
  <div id="bottom-bar-inner">
    <input id="task-input" type="text" placeholder="新しいリマインダー…"
      oninput="updateAddBtn()"
      onkeydown="if(event.key==='Enter')addTask()">
    <button id="add-btn" onclick="addTask()">+</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'reminder-tasks-v2';
let tasks = [];
let currentFilter = 'all';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    tasks = raw ? JSON.parse(raw) : [];
  } catch { tasks = []; }
  render();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function addTask() {
  const inp = document.getElementById('task-input');
  const text = inp.value.trim();
  if (!text) return;
  tasks.unshift({ id: Date.now(), text, done: false });
  inp.value = '';
  updateAddBtn();
  save(); render();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  save(); render();
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const activeCount = tasks.filter(t => !t.done).length;
  const doneCount   = tasks.filter(t =>  t.done).length;

  document.getElementById('count-label').textContent =
    activeCount > 0 ? `残り ${activeCount} 件` :
    tasks.length > 0 ? 'すべて完了！ 🎉' : '';

  const filtered = tasks.filter(t =>
    currentFilter === 'active' ? !t.done :
    currentFilter === 'done'   ?  t.done : true
  );

  const list = document.getElementById('task-list');
  // タスク行だけ削除（#empty-msgは残す）
  [...list.children].forEach(c => { if (c.id !== 'empty-msg') c.remove(); });

  const emptyMsg = document.getElementById('empty-msg');
  if (filtered.length === 0) {
    emptyMsg.style.display = 'block';
    emptyMsg.textContent =
      currentFilter === 'done'   ? '完了したタスクはありません' :
      currentFilter === 'active' ? '未完了のタスクはありません 🎉' :
      'タスクを追加してみましょう';
  } else {
    emptyMsg.style.display = 'none';
    filtered.forEach(task => {
      const div = document.createElement('div');
      div.className = 'task-item';
      div.innerHTML = `
        <button class="check-btn" onclick="toggleTask(${task.id})">
          ${task.done
            ? `<svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="#34C759"/><path d="M6.5 11L9.5 14L15.5 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`
            : `<svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="none" stroke="#C7C7CC" stroke-width="1.5"/></svg>`
          }
        </button>
        <span class="task-text${task.done ? ' done' : ''}">${esc(task.text)}</span>
        <button class="delete-btn" onclick="deleteTask(${task.id})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF3B30" stroke-width="2" stroke-linecap="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4h6v2"/></svg>
        </button>`;
      list.appendChild(div);
    });
  }

  const clearBtn = document.getElementById('clear-done-btn');
  clearBtn.style.display = doneCount > 0 && currentFilter !== 'active' ? 'block' : 'none';
  if (doneCount > 0) clearBtn.textContent = `完了済みを削除（${doneCount}件）`;
}

function updateAddBtn() {
  const val = document.getElementById('task-input').value.trim();
  document.getElementById('add-btn').classList.toggle('active', val.length > 0);
}

// ── コピー ─────────────────────────────────
function copyTasks() {
  if (tasks.length === 0) { showToast('タスクがありません'); return; }
  const active = tasks.filter(t => !t.done);
  const done   = tasks.filter(t =>  t.done);
  let text = '【リマインダー】\n';
  if (active.length) { text += '\n▼ 未完了\n'; active.forEach((t,i) => text += `${i+1}. ${t.text}\n`); }
  if (done.length)   { text += '\n▼ 完了済み\n'; done.forEach((t,i) => text += `${i+1}. ${t.text}\n`); }

  const copy = (t) => {
    showToast('コピーしました！Claudeに貼り付けてね ✨');
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    setTimeout(() => btn.classList.remove('copied'), 2000);
  };

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(copy).catch(() => fallbackCopy(text, copy));
  } else { fallbackCopy(text, copy); }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  cb();
}

// ── Toast ──────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Claude連携 ─────────────────────────────
function toggleClaude() {
  const panel = document.getElementById('claude-panel');
  const btn   = document.getElementById('claude-btn');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('active', open);
}

async function askClaude() {
  const inp  = document.getElementById('claude-input');
  const btn  = document.getElementById('claude-ask-btn');
  const resp = document.getElementById('claude-response');
  const q    = inp.value.trim();

  if (!q && tasks.length === 0) { showToast('タスクを追加してから相談してね'); return; }

  btn.disabled = true; btn.textContent = '…';
  resp.style.display = 'none';

  const list = tasks.map((t,i) => `${i+1}. [${t.done?'完了':'未完了'}] ${t.text}`).join('\n');
  const msg  = q
    ? `${q}\n\n現在のタスク一覧:\n${list || '（なし）'}`
    : `以下のタスク一覧を整理・優先度付けして、簡潔にアドバイスをください（3〜5文で）。\n\n${list}`;

  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'あなたはシンプルで前向きなタスク管理アシスタントです。簡潔・実用的・温かいトーンで日本語で返答してください。',
        messages: [{ role: 'user', content: msg }]
      })
    });
    const data = await res.json();
    resp.textContent = data.content?.find(b => b.type==='text')?.text || 'うまく取得できませんでした。';
  } catch {
    resp.textContent = '通信エラーが発生しました。もう一度お試しください。';
  }

  resp.style.display = 'block';
  btn.disabled = false; btn.textContent = '聞く';
  inp.value = '';
}

load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ToDo">
<title>ToDo リスト</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  font-family:-apple-system,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;
  background:#fff; color:#202124; -webkit-font-smoothing:antialiased; min-height:100vh; overflow-x:hidden;
}

/* ── Header ── */
#header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; padding-top:max(16px,env(safe-area-inset-top));
  border-bottom:1px solid #e0e0e0; position:sticky; top:0; background:#fff; z-index:20;
}
#header-left { display:flex; align-items:center; gap:12px; }
#menu-btn { background:none; border:none; cursor:pointer; padding:4px; line-height:0; color:#5f6368; }
#app-title { font-size:18px; font-weight:400; color:#202124; }
#sync-pill {
  display:flex; align-items:center; gap:5px; font-size:12px; color:#9aa0a6;
  padding:3px 8px; border-radius:12px; background:#f8f9fa; transition:all 0.3s;
}
#sync-pill.syncing { color:#fbbc04; background:#fef9e7; }
#sync-pill.ok      { color:#34a853; background:#e6f4ea; }
#sync-pill.error   { color:#ea4335; background:#fce8e6; }
#sync-dot { width:6px; height:6px; border-radius:50%; background:#9aa0a6; flex-shrink:0; transition:background 0.3s; }
#sync-pill.syncing #sync-dot { background:#fbbc04; animation:blink 1s infinite; }
#sync-pill.ok #sync-dot    { background:#34a853; }
#sync-pill.error #sync-dot { background:#ea4335; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
#copy-btn {
  background:none; border:1px solid #dadce0; border-radius:20px; padding:6px 12px;
  font-size:12px; font-weight:500; color:#5f6368; cursor:pointer; font-family:inherit;
  display:flex; align-items:center; gap:5px;
}
#copy-btn:active { background:#f1f3f4; }

/* ── Tabs ── */
#tabs { display:flex; border-bottom:1px solid #e0e0e0; padding:0 20px; }
.tab-btn {
  padding:12px 16px; font-size:14px; font-weight:500; color:#5f6368;
  background:none; border:none; border-bottom:3px solid transparent;
  cursor:pointer; font-family:inherit; transition:all 0.15s; white-space:nowrap;
}
.tab-btn.active { color:#1a73e8; border-bottom-color:#1a73e8; }

/* ── Task list ── */
#main { padding:0 0 120px; max-width:600px; margin:0 auto; position:relative; }

.task-item {
  display:flex; align-items:flex-start;
  padding:14px 20px;
  border-bottom:1px solid #f1f3f4; gap:12px; background:#fff;
  position:relative; user-select:none; -webkit-user-select:none;
  transition:background 0.12s, box-shadow 0.15s, transform 0.15s;
}
.task-item.drag-over-top    { border-top:2.5px solid #1a73e8; }
.task-item.drag-over-bottom { border-bottom:2.5px solid #1a73e8; }
.task-item.is-dragging {
  opacity:0.4;
}
.task-item.floating {
  position:fixed; z-index:500; left:0; right:0; margin:0 auto;
  max-width:600px; background:#fff;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);
  border-radius:12px; opacity:0.97;
  transition:none;
  pointer-events:none;
}

/* チェック丸 */
.check-circle {
  width:22px; height:22px; border-radius:50%; border:2px solid #bdc1c6;
  background:none; display:flex; align-items:center; justify-content:center;
  transition:all 0.25s; cursor:pointer; flex-shrink:0; margin-top:1px;
}
.check-circle:active { transform:scale(0.88); }
.check-circle.checking { border-color:#1a73e8; background:#e8f0fe; }
.check-circle.done { background:#1a73e8; border-color:#1a73e8; }

.task-body { flex:1; min-width:0; }
.task-text { font-size:16px; color:#202124; line-height:1.5; word-break:break-all; }
.task-text.done { color:#bdc1c6; text-decoration:line-through; }

/* インラインアクション */
.task-actions {
  display:none; gap:6px; margin-top:8px; flex-wrap:wrap;
}
.task-actions.open { display:flex; }
.task-action-btn {
  padding:5px 14px; border-radius:16px; border:none; font-size:13px; font-weight:500;
  cursor:pointer; font-family:inherit; transition:background 0.15s;
}
.task-action-consult { background:#FFF3E0; color:#E65100; }
.task-action-consult:active { background:#FFE0B2; }
.task-action-delete  { background:#fce8e6; color:#c62828; }
.task-action-delete:active  { background:#f5c6c3; }

.section-header { padding:16px 20px 8px; font-size:13px; font-weight:500; color:#5f6368; }
#empty-msg { padding:60px 20px; text-align:center; color:#bdc1c6; font-size:15px; line-height:1.6; }

/* ── Undo toast ── */
.undo-toast {
  position:fixed; bottom:max(90px,calc(env(safe-area-inset-bottom)+80px)); left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#323232; color:white; border-radius:24px;
  padding:12px 8px 12px 20px; font-size:14px; font-weight:500;
  display:flex; align-items:center; gap:4px; z-index:300;
  opacity:0; pointer-events:none; transition:all 0.28s; white-space:nowrap;
  font-family:-apple-system,sans-serif;
}
.undo-toast.show { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
.undo-toast-btn {
  background:none; border:none; color:#8ab4f8; font-size:14px; font-weight:700;
  cursor:pointer; padding:4px 12px; font-family:inherit;
}

/* ── FAB ── */
#fab {
  position:fixed; bottom:max(28px,env(safe-area-inset-bottom,28px)); left:50%;
  transform:translateX(-50%); width:56px; height:56px; border-radius:50%;
  background:#1a73e8; color:white; border:none; cursor:pointer;
  box-shadow:0 4px 12px rgba(26,115,232,0.4);
  display:flex; align-items:center; justify-content:center;
  z-index:30; transition:transform 0.2s, background 0.2s;
}
#fab:active { transform:translateX(-50%) scale(0.93); }
#fab.open { background:#5f6368; }

/* Overlay */
#overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:40;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
#overlay.open { opacity:1; pointer-events:auto; }

/* Input modal */
#input-modal {
  position:fixed; top:20%; left:50%; transform:translateX(-50%) translateY(-20px);
  width:calc(100% - 40px); max-width:500px;
  background:#fff; border-radius:16px; padding:24px 20px 20px;
  z-index:50; opacity:0; pointer-events:none;
  transition:opacity 0.2s, transform 0.2s; box-shadow:0 8px 32px rgba(0,0,0,0.18);
}
#input-modal.open { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
#input-modal-label { font-size:12px; font-weight:500; color:#1a73e8; letter-spacing:0.05em; margin-bottom:12px; }
#new-task-input {
  width:100%; border:none; outline:none; font-size:18px; color:#202124;
  font-family:inherit; padding:0; background:transparent; caret-color:#1a73e8; line-height:1.5;
}
#new-task-input::placeholder { color:#bdc1c6; }
#input-divider { height:1px; background:#e0e0e0; margin:14px 0; }
#input-divider.active { background:#1a73e8; }
#input-actions { display:flex; justify-content:flex-end; gap:8px; }
.modal-btn {
  padding:8px 20px; border-radius:20px; border:none; font-size:14px; font-weight:500;
  cursor:pointer; font-family:inherit; transition:background 0.15s;
}
#cancel-btn { background:none; color:#5f6368; }
#cancel-btn:hover { background:#f1f3f4; }
#save-btn { background:#1a73e8; color:white; }
#save-btn:disabled { background:#e0e0e0; color:#9aa0a6; cursor:default; }
</style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <button id="menu-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <span id="app-title">ToDo リスト</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div id="sync-pill"><div id="sync-dot"></div><span id="sync-text">読込中</span></div>
    <button id="copy-btn" onclick="copyTasks()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      コピー
    </button>
  </div>
</div>

<div id="tabs">
  <button class="tab-btn active" onclick="setFilter('active',this)">マイタスク</button>
  <button class="tab-btn" onclick="setFilter('done',this)">完了済み</button>
  <button class="tab-btn" onclick="setFilter('all',this)">すべて</button>
</div>

<div id="main"><div id="empty-msg">読み込み中…</div></div>

<div id="overlay" onclick="closeModal()"></div>

<button id="fab" onclick="openModal()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
</button>

<div id="input-modal">
  <div id="input-modal-label">新しいタスク</div>
  <input id="new-task-input" type="text" placeholder="タスクを入力…"
    oninput="updateSaveBtn()"
    onkeydown="if(event.key==='Enter')saveTask()"
    onfocus="document.getElementById('input-divider').classList.add('active')"
    onblur="document.getElementById('input-divider').classList.remove('active')">
  <div id="input-divider"></div>
  <div id="input-actions">
    <button class="modal-btn" id="cancel-btn" onclick="closeModal()">キャンセル</button>
    <button class="modal-btn" id="save-btn" disabled onclick="saveTask()">保存</button>
  </div>
</div>

<script>
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbzNEngb5IkUpSj5FDNVuuRYPNxuKugjkc0naqItiofhE_qMWfr9QBFA_4WDAGOek_UU/exec';
const LS_KEY   = 'reminder-tasks-v3';
const isMobile = /iPhone|Android|iPad/i.test(navigator.userAgent);

let tasks         = [];
let currentFilter = 'active';
let saveTimer     = null;
let openActionId  = null;

// undo スタック（完了・削除 両用）
let undoStack = [];  // [{type:'complete'|'delete', task, index}]

// ── ストレージ ─────────────────────────────
function lsLoad(){ try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null;}catch{return null;} }
function lsSave(){ localStorage.setItem(LS_KEY,JSON.stringify(tasks)); }

// ── 同期 ───────────────────────────────────
function setSS(s,t){ document.getElementById('sync-pill').className=s; document.getElementById('sync-text').textContent=t; }
async function loadFromSheet(){
  const c=lsLoad(); if(c){tasks=c;render();}
  setSS('syncing','同期中');
  try{ const r=await fetch(GAS_URL+'?t='+Date.now()); tasks=await r.json(); lsSave(); setSS('ok','同期済み'); render(); }
  catch{ setSS('error','オフライン'); if(!c){tasks=[];render();} }
}
async function saveToSheet(){
  setSS('syncing','保存中'); lsSave();
  try{ await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({tasks})}); setSS('ok','同期済み'); }
  catch{ setSS('error','保存失敗'); }
}
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveToSheet,800); }

// ── モーダル ───────────────────────────────
function openModal(){
  document.getElementById('input-modal').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('fab').classList.add('open');
  setTimeout(()=>document.getElementById('new-task-input').focus(),50);
}
function closeModal(){
  document.getElementById('input-modal').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('fab').classList.remove('open');
  document.getElementById('new-task-input').value='';
  document.getElementById('save-btn').disabled=true;
}
function updateSaveBtn(){ document.getElementById('save-btn').disabled=!document.getElementById('new-task-input').value.trim(); }
function saveTask(){
  const inp=document.getElementById('new-task-input');
  const text=inp.value.trim(); if(!text)return;
  tasks.unshift({id:Date.now(),text,done:false});
  closeModal(); render(); scheduleSave();
}

// ── タスク操作 ─────────────────────────────
function toggleTask(id){
  const t=tasks.find(t=>t.id===id); if(!t)return;
  if(!t.done){
    // まずチェックアニメーション
    const itemEl=document.querySelector(`[data-id="${id}"]`);
    const circleEl=itemEl&&itemEl.querySelector('.check-circle');
    if(circleEl) circleEl.classList.add('checking');
    setTimeout(()=>{
      t.done=true;
      scheduleSave();

      // UIだけ即座に「完了済み見た目」に変える（リストからは消さない）
      if(itemEl){
        const circle=itemEl.querySelector('.check-circle');
        if(circle){
          circle.classList.remove('checking');
          circle.classList.add('done');
          circle.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>`;
        }
        const txt=itemEl.querySelector('.task-text');
        if(txt){ txt.classList.add('done'); }
      }

      // Undoエントリを積んで、5秒後にrenderして正式にリストから消す
      const entry={type:'complete', task:{...t,done:false}};
      entry._removeTimer=setTimeout(()=>{ render(); },5000);
      pushUndo(entry);
    },280);
  } else {
    t.done=false; render(); scheduleSave();
  }
}

function deleteTask(id){
  const idx=tasks.findIndex(t=>t.id===id); if(idx===-1)return;
  pushUndo({type:'delete', task:{...tasks[idx]}, index:idx});
  tasks.splice(idx,1);
  closeActions(); render(); scheduleSave();
}

function setFilter(val,btn){
  currentFilter=val;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Undo ───────────────────────────────────
function pushUndo(entry){
  // 以前のtoastを消す
  clearAllUndoToasts();
  undoStack.push(entry);
  showUndoToast(entry);
}

function showUndoToast(entry){
  const msg = entry.type==='complete' ? 'タスクを完了しました' : 'タスクを削除しました';
  const toast = document.createElement('div');
  toast.className = 'undo-toast';
  toast.innerHTML = `<span>${msg}</span><button class="undo-toast-btn">元に戻す</button>`;
  toast.querySelector('.undo-toast-btn').addEventListener('click',()=>{
    doUndo(entry, toast);
  });
  document.body.appendChild(toast);
  requestAnimationFrame(()=>requestAnimationFrame(()=>toast.classList.add('show')));
  entry._toast = toast;
  entry._timer = setTimeout(()=>{
    toast.classList.remove('show');
    setTimeout(()=>toast.remove(),400);
  }, 5000);
}

function doUndo(entry, toast){
  clearTimeout(entry._timer);
  clearTimeout(entry._removeTimer); // 5秒後のrender予約もキャンセル
  if(toast && toast.classList){ toast.classList.remove('show'); }
  if(toast && toast.remove){ setTimeout(()=>{ try{toast.remove();}catch(e){} },400); }
  if(entry.type==='complete'){
    const t=tasks.find(t=>t.id===entry.task.id);
    if(t){ t.done=false; render(); scheduleSave(); }
  } else if(entry.type==='delete'){
    const idx=Math.min(entry.index, tasks.length);
    tasks.splice(idx,0,entry.task);
    render(); scheduleSave();
  }
}

function clearAllUndoToasts(){
  document.querySelectorAll('.undo-toast').forEach(t=>{
    t.classList.remove('show');
    setTimeout(()=>{ try{t.remove();}catch(e){} },400);
  });
}

// Cmd+Z / Ctrl+Z
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='z'){
    e.preventDefault();
    if(undoStack.length===0)return;
    const entry=undoStack.pop();
    clearTimeout(entry._timer);
    clearTimeout(entry._removeTimer);
    if(entry._toast){ entry._toast.classList.remove('show'); setTimeout(()=>{ try{entry._toast.remove();}catch(ex){} },400); }
    doUndo(entry, null);
  }
});

// ── アクション展開 ─────────────────────────
function toggleActions(id){
  if(openActionId===id){ closeActions(); return; }
  closeActions();
  openActionId=id;
  const el=document.querySelector(`[data-id="${id}"] .task-actions`);
  if(el) el.classList.add('open');
}
function closeActions(){
  if(openActionId===null)return;
  const el=document.querySelector(`[data-id="${openActionId}"] .task-actions`);
  if(el) el.classList.remove('open');
  openActionId=null;
}

// ── Claudeに相談 ──────────────────────────
function consultClaude(id){
  const t=tasks.find(t=>t.id===id); if(!t)return;
  closeActions();
  const prompt=encodeURIComponent(`以下のタスクを進めるために、具体的なアドバイスや手順を教えてください：\n\n「${t.text}」`);
  if(isMobile){
    // iOSアプリ deeplink → フォールバックでブラウザ
    window.location.href=`claude://new?q=${prompt}`;
    setTimeout(()=>{ window.open(`https://claude.ai/new?q=${prompt}`,'_blank'); },1200);
  } else {
    window.open(`https://claude.ai/new?q=${prompt}`,'_blank');
  }
}

// ── レンダリング ───────────────────────────
function render(){
  const main=document.getElementById('main');
  main.innerHTML='';
  const active=tasks.filter(t=>!t.done);
  const done  =tasks.filter(t=> t.done);
  let sA,sD;
  if     (currentFilter==='active'){sA=active;sD=[];}
  else if(currentFilter==='done'  ){sA=[];sD=done;}
  else                             {sA=active;sD=done;}

  if(sA.length===0&&sD.length===0){
    const msg=document.createElement('div'); msg.id='empty-msg';
    msg.textContent=currentFilter==='done'?'完了済みのタスクはありません':
                    currentFilter==='active'?'タスクを追加してみましょう':'タスクがありません';
    main.appendChild(msg); return;
  }
  sA.forEach(t=>main.appendChild(makeTaskEl(t)));
  if(sD.length>0){
    if(currentFilter==='all'){
      const hdr=document.createElement('div'); hdr.className='section-header';
      hdr.textContent=`完了済み（${sD.length}）`; main.appendChild(hdr);
    }
    sD.forEach(t=>main.appendChild(makeTaskEl(t)));
  }
}

function makeTaskEl(task){
  const div=document.createElement('div');
  div.className='task-item'; div.dataset.id=task.id;

  div.innerHTML=`
    <div class="check-circle ${task.done?'done':''}">
      ${task.done?`<svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>`:''}
    </div>
    <div class="task-body">
      <div class="task-text ${task.done?'done':''}">${esc(task.text)}</div>
      <div class="task-actions ${openActionId===task.id?'open':''}">
        <button class="task-action-btn task-action-consult">✦ Claudeに相談</button>
        <button class="task-action-btn task-action-delete">✕ 削除</button>
      </div>
    </div>`;

  // 丸ボタン → 完了
  div.querySelector('.check-circle').addEventListener('click', e=>{
    e.stopPropagation(); toggleTask(task.id);
  });

  // アクションボタン
  div.querySelector('.task-action-consult').addEventListener('click', e=>{
    e.stopPropagation(); consultClaude(task.id);
  });
  div.querySelector('.task-action-delete').addEventListener('click', e=>{
    e.stopPropagation(); deleteTask(task.id);
  });

  // テキストタップ/クリック → アクション展開
  const body=div.querySelector('.task-body');

  if(isMobile){
    // スマホ：タップ vs 長押し（ドラッグ）を判定
    let touchStartY=0, touchStartX=0, touchStartTime=0;
    let longPressTimer=null, isDragging=false;

    body.addEventListener('touchstart', e=>{
      touchStartY=e.touches[0].clientY;
      touchStartX=e.touches[0].clientX;
      touchStartTime=Date.now();
      isDragging=false;
      longPressTimer=setTimeout(()=>{
        isDragging=true;
        startTouchDrag(div, task.id, e);
      }, 500);
    },{passive:true});

    body.addEventListener('touchmove', e=>{
      const dy=Math.abs(e.touches[0].clientY-touchStartY);
      const dx=Math.abs(e.touches[0].clientX-touchStartX);
      if(dy>8||dx>8) clearTimeout(longPressTimer);
    },{passive:true});

    body.addEventListener('touchend', e=>{
      clearTimeout(longPressTimer);
      if(!isDragging && Date.now()-touchStartTime < 500){
        toggleActions(task.id);
      }
    });
  } else {
    // Mac：クリックでアクション展開
    body.addEventListener('click', e=>{
      e.stopPropagation();
      toggleActions(task.id);
    });
  }

  // デスクトップ drag（Mac）
  if(!isMobile){
    div.addEventListener('dragstart', e=>{
      dragSrcId=task.id; e.dataTransfer.effectAllowed='move';
      setTimeout(()=>div.classList.add('is-dragging'),0);
    });
    div.addEventListener('dragend', ()=>{
      div.classList.remove('is-dragging');
      document.querySelectorAll('.task-item').forEach(i=>i.classList.remove('drag-over-top','drag-over-bottom'));
      dragSrcId=null;
    });
    div.addEventListener('dragover', e=>{
      e.preventDefault();
      const rect=div.getBoundingClientRect();
      const mid=rect.top+rect.height/2;
      document.querySelectorAll('.task-item').forEach(i=>i.classList.remove('drag-over-top','drag-over-bottom'));
      div.classList.add(e.clientY<mid?'drag-over-top':'drag-over-bottom');
      dragOverId=task.id; dragOverPos=(e.clientY<mid?'before':'after');
    });
    div.addEventListener('dragleave', ()=>div.classList.remove('drag-over-top','drag-over-bottom'));
    div.addEventListener('drop', e=>{
      e.preventDefault();
      div.classList.remove('drag-over-top','drag-over-bottom');
      if(dragSrcId&&dragSrcId!==task.id) reorderTasks(dragSrcId,task.id,dragOverPos);
    });
    div.draggable=true;
  }

  return div;
}

// 外クリックでアクション閉じる
document.addEventListener('click', ()=>closeActions());

// ── デスクトップ drag ──────────────────────
let dragSrcId=null, dragOverId=null, dragOverPos='after';

// ── タッチドラッグ（スマホ長押し） ────────
function startTouchDrag(dragEl, taskId, startEvent){
  const task=tasks.find(t=>t.id===taskId); if(!task)return;

  // フローティングクローン
  const rect=dragEl.getBoundingClientRect();
  const clone=dragEl.cloneNode(true);
  clone.classList.add('floating');
  clone.style.width=rect.width+'px';
  clone.style.top=rect.top+'px';
  document.body.appendChild(clone);
  dragEl.classList.add('is-dragging');

  const offsetY=startEvent.touches[0].clientY-rect.top;

  function onMove(e){
    e.preventDefault();
    const ty=e.touches[0].clientY;
    clone.style.top=(ty-offsetY)+'px';

    // どのアイテムの上にいるか
    document.querySelectorAll('.task-item:not(.is-dragging):not(.floating)').forEach(item=>{
      item.classList.remove('drag-over-top','drag-over-bottom');
      const r=item.getBoundingClientRect();
      if(ty>=r.top&&ty<=r.bottom){
        const mid=r.top+r.height/2;
        item.classList.add(ty<mid?'drag-over-top':'drag-over-bottom');
      }
    });
  }

  function onEnd(e){
    clone.remove(); dragEl.classList.remove('is-dragging');
    document.querySelectorAll('.task-item').forEach(i=>i.classList.remove('drag-over-top','drag-over-bottom'));

    // drop先を探す
    const ty=e.changedTouches[0].clientY;
    let targetId=null, pos='after';
    document.querySelectorAll('.task-item:not(.is-dragging)').forEach(item=>{
      const r=item.getBoundingClientRect();
      if(ty>=r.top&&ty<=r.bottom){
        targetId=parseInt(item.dataset.id);
        pos=ty<(r.top+r.height/2)?'before':'after';
      }
    });
    if(targetId&&targetId!==taskId) reorderTasks(taskId,targetId,pos);

    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
  }

  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}

function reorderTasks(srcId,tgtId,pos='after'){
  const si=tasks.findIndex(t=>t.id===srcId);
  const ti=tasks.findIndex(t=>t.id===tgtId);
  if(si===-1||ti===-1)return;
  const[moved]=tasks.splice(si,1);
  const newTi=tasks.findIndex(t=>t.id===tgtId);
  tasks.splice(pos==='before'?newTi:newTi+1,0,moved);
  render(); scheduleSave();
}

// ── コピー ─────────────────────────────────
function copyTasks(){
  if(tasks.length===0){showToast('タスクがありません');return;}
  const active=tasks.filter(t=>!t.done),done=tasks.filter(t=>t.done);
  let text='【ToDoリスト】\n';
  if(active.length){text+='\n▼ 未完了\n';active.forEach((t,i)=>text+=`${i+1}. ${t.text}\n`);}
  if(done.length)  {text+='\n▼ 完了済み\n';done.forEach((t,i)=>text+=`${i+1}. ${t.text}\n`);}
  const cb=()=>showToast('コピーしました！Claudeに貼り付けてね ✨');
  if(navigator.clipboard) navigator.clipboard.writeText(text).then(cb).catch(()=>fallbackCopy(text,cb));
  else fallbackCopy(text,cb);
}
function fallbackCopy(text,cb){
  const ta=document.createElement('textarea'); ta.value=text;
  ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta); cb();
}
let toastTimer;
function showToast(msg){
  let t=document.getElementById('_toast');
  if(!t){
    t=document.createElement('div'); t.id='_toast';
    t.style.cssText=`position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(10px);
      background:rgba(40,40,40,0.92);color:white;padding:10px 20px;border-radius:20px;
      font-size:14px;font-weight:500;opacity:0;transition:all 0.25s;pointer-events:none;
      white-space:nowrap;z-index:100;font-family:-apple-system,sans-serif;`;
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)'; },2500);
}

// ── 起動 ───────────────────────────────────
loadFromSheet();
</script>
